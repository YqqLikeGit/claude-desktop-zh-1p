name: Bug 报告
description: 安装失败、界面仍英文、Claude 打不开等
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请先阅读 [README FAQ](https://github.com/YqqLikeGit/claude-desktop-zh-1p#faq)。
        附上 `~/Library/Application Support/Claude/zh-cn-hook.log` 最后 20 行。
  - type: input
    id: claude-version
    attributes:
      label: Claude Desktop 版本
      placeholder: "例如 1.8555.x"
    validations:
      required: true
  - type: dropdown
    id: account-type
    attributes:
      label: 账号类型
      options:
        - 官方 Pro 订阅（claude.ai 登录）
        - API 网关 / 第三方
        - 不确定
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: "1. Cmd+Q 退出 Claude\n2. 双击 install-mac.command\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: zh-cn-hook.log（可选）
      render: shell
